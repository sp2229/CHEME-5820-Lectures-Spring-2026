<?xml version="1.0" encoding="UTF-8"?>
<svg width="960px" height="360px" viewBox="0 0 960 360" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <title>Hopfield Convergence Landscape Schematic</title>
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#666666"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="360" fill="#FFFFFF"/>

  <text x="480" y="34" text-anchor="middle" font-family="Helvetica" font-size="20" fill="#000000">
    Hopfield Energy Landscape (schematic)
  </text>

  <!-- Axes -->
  <line x1="80" y1="300" x2="910" y2="300" stroke="#000000" stroke-width="1.2"/>
  <line x1="80" y1="300" x2="80" y2="70" stroke="#000000" stroke-width="1.2"/>
  <text x="495" y="334" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#000000">
    state-space direction (schematic)
  </text>
  <text x="28" y="188" transform="rotate(-90 28 188)" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#000000">
    energy E(s)
  </text>

  <!-- Energy landscape -->
  <path d="M 90 135
           C 140 160, 182 238, 242 258
           C 300 278, 342 160, 400 145
           C 460 130, 510 225, 560 245
           C 620 262, 662 165, 720 148
           C 780 135, 835 240, 878 258
           C 894 264, 902 250, 910 226"
        fill="none" stroke="#4D4D4D" stroke-width="3"/>

  <!-- Minima: exactly on valley bottoms -->
  <circle cx="242" cy="258" r="5" fill="#000000"/>
  <circle cx="560" cy="245" r="5" fill="#000000"/>
  <circle cx="878" cy="258" r="5" fill="#000000"/>

  <!-- Noisy cues: on the surface, away from minima -->
  <circle cx="182" cy="238" r="5" fill="#FFFFFF" stroke="#666666" stroke-width="1.6"/>
  <circle cx="510" cy="225" r="5" fill="#FFFFFF" stroke="#666666" stroke-width="1.6"/>
  <circle cx="835" cy="240" r="5" fill="#FFFFFF" stroke="#666666" stroke-width="1.6"/>

  <!-- Descent arrows from cue to nearest valley -->
  <line x1="184" y1="239" x2="232" y2="254" stroke="#666666" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="512" y1="226" x2="551" y2="242" stroke="#666666" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="837" y1="241" x2="870" y2="255" stroke="#666666" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <text x="498" y="104" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#000000">
    asynchronous updates move downhill (ΔE ≤ 0)
  </text>

  <!-- Cue labels with leader lines (kept off the curve) -->
  <text x="132" y="206" font-family="Helvetica" font-size="12" fill="#555555">noisy cue</text>
  <line x1="165" y1="210" x2="178" y2="233" stroke="#888888" stroke-width="1"/>

  <text x="466" y="194" font-family="Helvetica" font-size="12" fill="#555555">noisy cue</text>
  <line x1="500" y1="198" x2="507" y2="220" stroke="#888888" stroke-width="1"/>

  <text x="792" y="212" font-family="Helvetica" font-size="12" fill="#555555">noisy cue</text>
  <line x1="823" y1="216" x2="832" y2="235" stroke="#888888" stroke-width="1"/>

  <!-- Minima labels with leader lines -->
  <text x="160" y="294" font-family="Helvetica" font-size="13" fill="#000000">spurious minimum</text>
  <line x1="228" y1="286" x2="240" y2="262" stroke="#666666" stroke-width="1"/>

  <text x="486" y="294" font-family="Helvetica" font-size="13" fill="#000000">stored memory minimum</text>
  <line x1="590" y1="286" x2="562" y2="249" stroke="#666666" stroke-width="1"/>

  <text x="770" y="294" font-family="Helvetica" font-size="13" fill="#000000">antipattern minimum</text>
  <line x1="845" y1="286" x2="876" y2="262" stroke="#666666" stroke-width="1"/>
</svg>
